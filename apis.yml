aid: suger
name: Suger
description: >-
  Suger is the fastest and easiest way for ISVs to list, transact, and co-sell on
  cloud marketplaces including AWS Marketplace, Azure Marketplace, GCP Marketplace,
  and Snowflake Marketplace. Suger provides a full API for managing products, offers,
  entitlements, buyers, usage metering, and revenue reporting.
