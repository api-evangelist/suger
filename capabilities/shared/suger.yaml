naftiko: "1.0.0-alpha1"

info:
  label: "Suger API"
  description: "CRUD operations for cloud marketplace resources including organizations, products, offers, entitlements, and usage metering."
  tags:
    - Cloud Marketplace
    - GTM
    - SaaS
    - Billing
    - Entitlement
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SUGER_API_KEY: SUGER_API_KEY

capability:
  consumes:
    - type: http
      namespace: suger
      baseUri: https://api.suger.cloud
      description: "Suger cloud marketplace API for ISVs to manage products, offers, entitlements, and usage metering."
      authentication:
        type: apikey
        key: Authorization
        value: "{{SUGER_API_KEY}}"
        placement: header
      resources:
        - name: products
          path: /org/{orgId}/product
          description: "Cloud marketplace product listings"
          operations:
            - name: list-products
              method: GET
              description: "List Products"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-product
              method: POST
              description: "Create Product"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
        - name: product
          path: /org/{orgId}/product/{productId}
          description: "Individual product operations"
          operations:
            - name: get-product
              method: GET
              description: "Get Product"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                  description: "Organization ID"
                - name: productId
                  in: path
                  type: string
                  required: true
                  description: "Product ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-product
              method: PATCH
              description: "Update Product"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                - name: productId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-product
              method: DELETE
              description: "Delete Product"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                - name: productId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: offers
          path: /org/{orgId}/offer
          description: "Marketplace offer management"
          operations:
            - name: list-offers
              method: GET
              description: "List Offers"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-offer
              method: POST
              description: "Create Offer"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  productId: "{{tools.productId}}"
        - name: offer
          path: /org/{orgId}/offer/{offerId}
          description: "Individual offer operations"
          operations:
            - name: get-offer
              method: GET
              description: "Get Offer"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                - name: offerId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-offer
              method: DELETE
              description: "Delete Offer"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                - name: offerId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: entitlements
          path: /org/{orgId}/entitlement
          description: "Customer entitlement management"
          operations:
            - name: list-entitlements
              method: GET
              description: "List Entitlements"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                - name: buyerId
                  in: query
                  type: string
                  required: false
                  description: "Filter by buyer ID"
                - name: productId
                  in: query
                  type: string
                  required: false
                  description: "Filter by product ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-entitlement
              method: POST
              description: "Create Entitlement"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  buyerId: "{{tools.buyerId}}"
                  offerId: "{{tools.offerId}}"
        - name: entitlement
          path: /org/{orgId}/entitlement/{entitlementId}
          description: "Individual entitlement operations"
          operations:
            - name: get-entitlement
              method: GET
              description: "Get Entitlement"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                - name: entitlementId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: buyers
          path: /org/{orgId}/buyer
          description: "Buyer/customer management"
          operations:
            - name: list-buyers
              method: GET
              description: "List Buyers"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-buyer
              method: POST
              description: "Create Buyer"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  email: "{{tools.email}}"
        - name: usage-record-groups
          path: /org/{orgId}/usageRecordGroup
          description: "Usage metering record groups"
          operations:
            - name: list-usage-record-groups
              method: GET
              description: "List Usage Record Groups"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                - name: entitlementId
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: invoices
          path: /org/{orgId}/invoice
          description: "Invoice management"
          operations:
            - name: list-invoices
              method: GET
              description: "List Invoices"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: revenue-records
          path: /org/{orgId}/partner/{partner}/revenueRecord
          description: "Revenue record reporting"
          operations:
            - name: list-revenue-records
              method: GET
              description: "List Revenue Records"
              inputParameters:
                - name: orgId
                  in: path
                  type: string
                  required: true
                - name: partner
                  in: path
                  type: string
                  required: true
                  description: "Cloud marketplace partner (aws, azure, gcp)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: suger-api
      resources:
        - path: /v1/products
          name: products
          description: "Cloud marketplace product listings"
          operations:
            - method: GET
              name: list-products
              description: "List all products"
            - method: POST
              name: create-product
              description: "Create a new product"
        - path: /v1/offers
          name: offers
          description: "Marketplace offer management"
          operations:
            - method: GET
              name: list-offers
              description: "List all offers"
            - method: POST
              name: create-offer
              description: "Create a new offer"
        - path: /v1/entitlements
          name: entitlements
          description: "Customer entitlements"
          operations:
            - method: GET
              name: list-entitlements
              description: "List all entitlements"
            - method: POST
              name: create-entitlement
              description: "Create a new entitlement"
        - path: /v1/buyers
          name: buyers
          description: "Buyer management"
          operations:
            - method: GET
              name: list-buyers
              description: "List all buyers"
            - method: POST
              name: create-buyer
              description: "Create a new buyer"

    - type: mcp
      port: 9100
      namespace: suger-mcp
      transport: http
      tools:
        - name: list-products
          description: "List all cloud marketplace products"
          hints:
            readOnly: true
            idempotent: true
        - name: get-product
          description: "Get a specific product by ID"
          hints:
            readOnly: true
            idempotent: true
        - name: list-offers
          description: "List all marketplace offers"
          hints:
            readOnly: true
            idempotent: true
        - name: get-offer
          description: "Get a specific offer by ID"
          hints:
            readOnly: true
            idempotent: true
        - name: list-entitlements
          description: "List customer entitlements"
          hints:
            readOnly: true
            idempotent: true
        - name: get-entitlement
          description: "Get a specific entitlement by ID"
          hints:
            readOnly: true
            idempotent: true
        - name: list-buyers
          description: "List all buyers/customers"
          hints:
            readOnly: true
            idempotent: true
        - name: list-invoices
          description: "List all invoices"
          hints:
            readOnly: true
            idempotent: true
        - name: list-revenue-records
          description: "List revenue records for a cloud marketplace partner"
          hints:
            readOnly: true
            idempotent: true
