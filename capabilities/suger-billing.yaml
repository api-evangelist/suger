    - path: /v1/org/{orgid}/addon
      name: org-orgid-addon
      description: REST surface for org-orgId-addon.
      operations:
      - method: GET
        name: listaddons
        description: List Addons
        call: suger-billing.listaddons
        with:
          orgId: rest.orgId
          limit: rest.limit
          offset: rest.offset
